plugins:
  onboarding_guide_enabled:
    default: false
    client: true
  onboarding_guide_version:
    default: 1
  onboarding_guide_target_groups:
    default: ""
    type: group_list
  onboarding_guide_tutorial_category_slug:
    default: "tutorial"
  onboarding_guide_preference_strategy:
    default: "inline_picker"
    type: enum
    choices:
      - "inline_picker"
      - "mute_all_except_tutorial"
  onboarding_guide_pledges_json:
    default: '["我承诺不截图外传。","我了解账号安全的重要性，不会泄露密码或外借。"]'
    validator: "::DiscourseOnboardingGuide::JsonArrayValidator"
  onboarding_guide_preference_items_json:
    default: "[]"
    validator: "::DiscourseOnboardingGuide::PreferenceItemsValidator"
